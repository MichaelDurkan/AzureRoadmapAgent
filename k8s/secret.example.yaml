# secret.example.yaml — DO NOT commit with real values.
# This file is a template. GitHub Actions creates the real Secret at deploy time
# using repository secrets (see .github/workflows/cd-deploy-aks.yml).
#
# To apply manually for local testing (base64-encode all values first):
#   kubectl create secret generic agent-secrets \
#     --from-literal=SMTP_USER='you@domain.com' \
#     --from-literal=SMTP_PASSWORD='your-app-password' \
#     --from-literal=SMTP_FROM='Azure Roadmap Agent <you@domain.com>' \
#     --from-literal=RECIPIENT_EMAIL='you@domain.com' \
#     --namespace azure-roadmap-agent \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: azure-roadmap-agent
  labels:
    app.kubernetes.io/name: azure-roadmap-agent
type: Opaque
stringData:
  SMTP_USER: "CHANGE_ME"
  SMTP_PASSWORD: "CHANGE_ME"
  SMTP_FROM: "CHANGE_ME"
  RECIPIENT_EMAIL: "CHANGE_ME"
