apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: azure-roadmap-agent
  labels:
    app.kubernetes.io/name: azure-roadmap-agent
    app.kubernetes.io/component: api
  annotations:
    # Azure annotation to assign a static public IP (optional).
    # Uncomment and set after running: az network public-ip create ...
    # service.beta.kubernetes.io/azure-load-balancer-ip: "YOUR_STATIC_IP"
    #
    # To restrict access to specific source IPs (recommended for production):
    # service.beta.kubernetes.io/azure-load-balancer-source-ranges: "1.2.3.4/32"
spec:
  type: LoadBalancer
  selector:
    app: azure-roadmap-agent-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8080
      protocol: TCP
